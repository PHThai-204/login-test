name: login_test
description: "A project about login  screen"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^8.0.2
  flutter_svg: ^2.2.4
  easy_localization: ^3.0.7
  firebase_core: ^3.15.2
  cloud_firestore: ^5.3.0
  crypto: ^3.0.3
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  cryptography: ^2.9.0
  flutter_keyboard_visibility: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^2.12.1
  build_runner: ^2.12.2
  flutter_gen_runner: ^5.13.0+1

flutter_gen:
  output: lib/generated/
  line_length: 150

  integrations:
    flutter_svg: true
    lottie: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/svgs/
    - assets/translations/